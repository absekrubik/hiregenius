<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Apply for Job | HireGenius</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="container navbar">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="HireGenius Logo">
    </a>

    <div class="menu-toggle" id="menuToggle">☰</div>

    <nav class="nav-menu" id="navMenu">
      <a href="index.html">Home</a>
      <a href="jobs.html">Find Jobs</a>
      <a href="#">Companies</a>
      <a href="#">About</a>
      <a href="#" class="resume-link">Create Resume</a>
      <a href="login.html">Sign In</a>
      <a href="post-job.html" class="btn btn-primary">Post a Job</a>
    </nav>
  </div>
</header>

<main>
  <section class="auth-page">
    <div class="container auth-container">

      <div class="auth-card">
        <span class="section-label">Job Application</span>

        <h1>Apply Now</h1>

        <p id="applyJobTitle">
          Loading job details...
        </p>

        <form id="applyForm" class="auth-form">

          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="applicantName" placeholder="Enter your full name" required>
          </div>

          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="applicantEmail" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label>Phone Number *</label>
            <input type="text" id="applicantPhone" placeholder="Enter your phone number" required>
          </div>

          <div class="form-group">
            <label>Resume Link *</label>
            <input type="url" id="resumeLink" placeholder="Paste Google Drive / Dropbox / portfolio resume link" required>
          </div>

          <div class="form-group">
            <label>Cover Message</label>
            <textarea id="coverMessage" rows="5" placeholder="Write a short message to the employer..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary auth-btn">
            Submit Application
          </button>

          <p id="applyMessage" class="auth-message"></p>

        </form>
      </div>

    </div>
  </section>
</main>

<footer class="footer">
  <div class="container footer-content">
    <div>
      <img src="images/logo.png" alt="HireGenius Logo" class="footer-logo">
      <p>Your premium job search partner for the future of work.</p>
    </div>

    <div>
      <h4>Company</h4>
      <a href="index.html">Home</a>
      <a href="jobs.html">Find Jobs</a>
      <a href="#">Companies</a>
      <a href="#">About</a>
    </div>

    <div>
      <h4>Employer</h4>
      <a href="post-job.html">Post a Job</a>
      <a href="employer-dashboard.html">Employer Dashboard</a>
      <a href="#">Pricing</a>
    </div>
  </div>
</footer>

<script type="module" src="js/apply.js"></script>
</body>
</html>
